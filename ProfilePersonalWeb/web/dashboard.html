<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Community - Profile Registration</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Consistent Rich emerald/forest green gradient */
            background: linear-gradient(135deg, #091c14 0%, #163828 50%, #205c42 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container {
            /* Glassmorphism effect to maintain UI consistency */
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            padding: 45px 40px;
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 540px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header .leaf-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .form-header h2 {
            margin: 0;
            color: #163828; /* Dark forest green */
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: #52b788; /* Vibrant sage green */
            margin: 8px 0 0 0;
            font-size: 15px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #163828;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e5eb; 
            background-color: #f8f9fa;
            border-radius: 12px;
            font-size: 15px;
            color: #163828;
            box-sizing: border-box;
            transition: all 0.3s ease-in-out;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 110px;
            font-family: inherit;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #52b788; 
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(82, 183, 136, 0.15);
        }

        .btn-submit {
            background-color: #205c42; 
            color: #ffffff;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(32, 92, 66, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #163828; 
            color: #84a98c;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(22, 56, 40, 0.3);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        @media (max-width: 480px) {
            body { padding: 20px 10px; }
            .form-container { padding: 30px 20px; }
            .form-header h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h2>Create Personal Profile</h2>
        <p>Fill out your details to display your personal digital card.</p>
    </div>

    <form action="ProfileServlet" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="E.g. Khair Bahar" required>
        </div>

        <div class="form-group">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" name="studentId" placeholder="E.g. 2026884122" required>
        </div>

        <div class="form-group">
            <label for="program">Academic Program</label>
            <input type="text" id="program" name="program" placeholder="E.g. CS230 - Bachelor of Computer Science" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="E.g. student@student.uitm.edu.my" required>
        </div>

        <div class="form-group">
            <label for="hobbies">Hobbies & Passions</label>
            <input type="text" id="hobbies" name="hobbies" placeholder="E.g. Hacking " required>
        </div>

        <div class="form-group">
            <label for="bio">Short Self-Introduction</label>
            <textarea id="bio" name="bio" placeholder="Tell the world a piece of your story..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Generate Personal Profile</button>
    </form>
</div>

</body>
</html>
