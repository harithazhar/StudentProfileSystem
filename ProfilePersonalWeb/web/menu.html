<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
         
            background: linear-gradient(135deg, #091c14 0%, #163828 50%, #205c42 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .menu-header {
            background: linear-gradient(135deg, #163828, #205c42);
            color: white;
            padding: 40px 20px;
            border-bottom: 5px solid #84a98c; /* Aksen sage green */
        }

        .menu-header h1 {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .menu-header p {
            color: #d8e2dc;
            margin: 0;
            font-size: 15px;
        }

        .menu-body {
            padding: 40px 30px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-register {
            background-color: #205c42;
            color: white;
            border: 2px solid transparent;
        }

        .btn-register:hover {
            background-color: transparent;
            color: #205c42;
            border-color: #205c42;
            transform: translateY(-3px);
        }

        .btn-view {
            background-color: #84a98c;
            color: #091c14;
            border: 2px solid transparent;
        }

        .btn-view:hover {
            background-color: transparent;
            color: #84a98c;
            border-color: #84a98c;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="menu-header">
            <h1>Profile Management System</h1>
        
        </div>
        
        <div class="menu-body">
            <a href="index.html" class="action-btn btn-register">
                <i class="fas fa-user-plus"></i> Register New Profile
            </a>
            
            <a href="ProfileServlet?action=view" class="action-btn btn-view">
                <i class="fas fa-users"></i> View Registered Profiles
            </a>
        </div>
    </div>

</body>
</html>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Animated gradient background */
        background: linear-gradient(135deg, #091c14, #163828, #205c42, #2d6a4f);
        background-size: 400% 400%;
        animation: gradientAnimation 10s ease infinite;
    }

    @keyframes gradientAnimation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Glass card styling kekal sama */
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        border-radius: 24px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 500px;
        text-align: center;
        overflow: hidden;
    }
</style>
