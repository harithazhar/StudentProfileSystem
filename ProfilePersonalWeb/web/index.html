<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Student | StudentConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: #1a3c34; color: white; padding: 40px 0; text-align: center; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px; margin-top: -50px; }
        .icon-box { color: #27ae60; font-size: 1.5rem; margin-right: 10px; }
        .btn-action { background: #1a3c34; color: white; border-radius: 12px; padding: 12px; font-weight: 600; }
        .btn-action:hover { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1><i class="fas fa-user-graduate"></i> Student Registration</h1>
        <p>Complete the form below to initiate your profile entry.</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 form-card">
                <form action="ProfileServlet" method="POST">
                    <input type="hidden" name="action" value="add">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label><i class="fas fa-id-card icon-box"></i>Student ID</label>
                            <input type="text" name="studentId" class="form-control" placeholder="ID Number" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label><i class="fas fa-user icon-box"></i>Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Legal Name" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label><i class="fas fa-book icon-box"></i>Programme</label>
                            <input type="text" name="program" class="form-control" placeholder="Course Code" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label><i class="fas fa-envelope icon-box"></i>Institutional Email</label>
                            <input type="email" name="email" class="form-control" placeholder="student@uitm.edu.my" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label><i class="fas fa-star icon-box"></i>Core Interests</label>
                        <input type="text" name="hobbies" class="form-control" placeholder="List your hobbies">
                    </div>
                    <div class="mb-4">
                        <label><i class="fas fa-align-left icon-box"></i>Personal Bio</label>
                        <textarea name="bio" class="form-control" rows="4" placeholder="Briefly introduce yourself..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-action w-100">Submit Registration</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
